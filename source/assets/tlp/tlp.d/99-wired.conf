# wired-dots TLP config — deployed only with --with-tlp flag
# Optimized for battery longevity on laptops. Hardware-agnostic.
#
# DISK_DEVICES intentionally omitted: TLP auto-discovers all rotational
# and SSD/NVMe devices from /sys/block when the line is absent. Hardcoding
# disk node names breaks systems with different storage layouts.
#
# Charge thresholds (start/stop %) are NOT defined here because the
# kernel interface is vendor-specific. Phase 04e_power.sh writes
# /etc/tlp.d/99-wired-charge-thresh.conf only when the running hardware
# exposes /sys/class/power_supply/BAT?/charge_control_*_threshold and
# they're writable. On unsupported vendors the thresholds simply aren't
# emitted (TLP wouldn't honor them anyway).

CPU_SCALING_GOVERNOR_ON_AC=schedutil
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"

RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on
