# wired-dots — hypridle
# Single config; AC/battery state checked at suspend time (decision #32).
# No variants needed — runtime detection handles AC/battery.

general {
    lock_cmd              = hyprlock
    unlock_cmd            = pkill -x hyprlock
    ignore_dbus_inhibit   = false
    ignore_systemd_inhibit = false
    before_sleep_cmd      = loginctl lock-session
    after_sleep_cmd       = hyprctl dispatch dpms on
}

# Dim display after 60s
listener {
    timeout    = 60
    on-timeout = brightnessctl -s && brightnessctl s 1%
    on-resume  = brightnessctl -r
}

# Lock after 120s
listener {
    timeout    = 120
    on-timeout = loginctl lock-session
}

# DPMS off after 300s
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Suspend after 500s — only on battery
listener {
    timeout    = 500
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null)" = "0" ] && systemctl suspend'
}
