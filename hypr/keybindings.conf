# wired-dots — keybindings
# All volume binds call wpctl directly. No wrapper scripts.
# See: docs/keybindings.md for full reference.

$mainMod = SUPER

# ── Window management ──
bind  = $mainMod, Q,           killactive
bind  = $mainMod, Delete,      exec, loginctl terminate-user $USER
bind  = $mainMod, W,           togglefloating
bind  = $mainMod, G,           togglegroup
bind  = $mainMod Control, H,   changegroupactive, b
bind  = $mainMod Control, L,   changegroupactive, f
bind  = Shift, F11,            fullscreen
bind  = $mainMod, J,           layoutmsg, togglesplit

# Focus
bind  = $mainMod, Left,        movefocus, l
bind  = $mainMod, Right,       movefocus, r
bind  = $mainMod, Up,          movefocus, u
bind  = $mainMod, Down,        movefocus, d
bind  = ALT, Tab,              cyclenext

# Resize
binde = $mainMod Shift, Right, resizeactive, 30 0
binde = $mainMod Shift, Left,  resizeactive, -30 0
binde = $mainMod Shift, Up,    resizeactive, 0 -30
binde = $mainMod Shift, Down,  resizeactive, 0 30

# Move (mouse)
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow
bindm = $mainMod, Z,           movewindow
bindm = $mainMod, X,           resizewindow

# ── Launchers ──
bind  = $mainMod, T,           exec, kitty
bind  = $mainMod, E,           exec, nautilus
bind  = $mainMod, B,           exec, brave
bind  = Control Shift, Escape, exec, kitty --title sysmon -e btop
bind  = $mainMod, L,           exec, hyprlock
bind  = Control Alt, Delete,   exec, wlogout

# Rofi
bind  = $mainMod, A,           exec, pkill -x rofi || rofi -show drun
bind  = $mainMod, TAB,         exec, pkill -x rofi || rofi -show window
bind  = $mainMod, V,           exec, pkill -x rofi || ~/.local/bin/cliphist-rofi

# Waybar toggle
bind  = Alt_R, Control_R,      exec, killall waybar || waybar

# Notifications (swaync toggle)
bind  = $mainMod, N,           exec, swaync-client -t

# ── Volume — wpctl direct (no wrappers, prevents queue pileup) ──
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , F10,                  exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , F12,                  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , F11,                  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPause,       exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Keyboard layout
bind  = $mainMod, K, exec, hyprctl switchxkblayout all next

# ── Screenshots ──
bind  = $mainMod, P,         exec, ~/.local/bin/screenshot.sh region
bind  = $mainMod Shift, P,   exec, ~/.local/bin/screenshot.sh window
bind  = $mainMod Control, P, exec, ~/.local/bin/screenshot.sh monitor

# ── Wallpaper ──
bind  = $mainMod Alt, Right, exec, ~/.local/bin/wallpaper next
bind  = $mainMod Alt, Left,  exec, ~/.local/bin/wallpaper prev

# ── Workspaces ──
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod Control, Right, workspace, r+1
bind = $mainMod Control, Left,  workspace, r-1
bind = $mainMod Control, Down,  workspace, empty

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move window to workspace
bind = $mainMod Shift, 1, movetoworkspace, 1
bind = $mainMod Shift, 2, movetoworkspace, 2
bind = $mainMod Shift, 3, movetoworkspace, 3
bind = $mainMod Shift, 4, movetoworkspace, 4
bind = $mainMod Shift, 5, movetoworkspace, 5
bind = $mainMod Shift, 6, movetoworkspace, 6
bind = $mainMod Shift, 7, movetoworkspace, 7
bind = $mainMod Shift, 8, movetoworkspace, 8
bind = $mainMod Shift, 9, movetoworkspace, 9
bind = $mainMod Shift, 0, movetoworkspace, 10

bind = $mainMod Control Alt, Right, movetoworkspace, r+1
bind = $mainMod Control Alt, Left,  movetoworkspace, r-1

# Special workspace (scratchpad)
bind = $mainMod Shift, S, movetoworkspace,       special
bind = $mainMod Alt,   S, movetoworkspacesilent, special
bind = $mainMod,       S, togglespecialworkspace

# Silent moves
bind = $mainMod Alt, 1, movetoworkspacesilent, 1
bind = $mainMod Alt, 2, movetoworkspacesilent, 2
bind = $mainMod Alt, 3, movetoworkspacesilent, 3
bind = $mainMod Alt, 4, movetoworkspacesilent, 4
bind = $mainMod Alt, 5, movetoworkspacesilent, 5
bind = $mainMod Alt, 6, movetoworkspacesilent, 6
bind = $mainMod Alt, 7, movetoworkspacesilent, 7
bind = $mainMod Alt, 8, movetoworkspacesilent, 8
bind = $mainMod Alt, 9, movetoworkspacesilent, 9
bind = $mainMod Alt, 0, movetoworkspacesilent, 10
