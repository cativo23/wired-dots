# wired-dots — user preferences
# Hardware: keyboard, touchpad, borders, window swallowing
# Exec-once: all Hyprland user-scope services start here (not systemctl --user)

input {
    kb_layout = latam,us
    touchpad {
        natural_scroll = yes
        scroll_factor = 0.15
    }
}

misc {
    enable_swallow = true
    swallow_regex = (foot|kitty|alacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

decoration {
    rounding = 0
}

general {
    col.active_border   = rgba(bb9af7ff) rgba(50fa7bff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(565f89cc) rgba(292e42cc) 45deg
}

ecosystem {
    no_update_news = true
}

# ── Cursor theme env (XWayland apps need these explicitly) ──
env = XCURSOR_THEME,phinger-cursors-dark
env = XCURSOR_SIZE,24

# ── Session env propagation (must run before anything that reads env vars) ──
exec-once = dbus-update-activation-environment --systemd --all

# ── Keyring (SSH agent + secret service for Brave, gh-cli, etc.) ──
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11

# ── Core Hyprland helpers (need $WAYLAND_DISPLAY — use exec-once, not systemctl) ──
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = hyprsunset

# ── Desktop services ──
exec-once = swaync
exec-once = waybar
exec-once = udiskie --tray
exec-once = pgrep -x awww-daemon || awww-daemon

# ── Clipboard (text + image) ──
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

# ── Keyboard layout switch: Super + Space ──
bind = SUPER, space, exec, hyprctl switchxkblayout all next && sleep 0.1 && notify-send -t 2000 "Keyboard" "$(hyprctl devices -j | grep -oP '"active_keymap": "\K[^"]+' | head -1)"

# ── Lid switch: lock + suspend on close ──
bindl = , switch:on:Lid Switch, exec, systemctl suspend
