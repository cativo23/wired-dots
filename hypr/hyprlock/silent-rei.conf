# Silent Rei - Hyprlock layout matching SDDM Silent (rei) theme
# Dark minimal with lavender (#C3C6FB) accents

$fontFamily = Red Hat Display
$accentColor = rgba(195, 198, 251, 1.0)
$accentDim = rgba(195, 198, 251, 0.6)
$darkBg = rgba(0, 0, 0, 0.85)

# ANIMATIONS
bezier = softIn, 0.25, 0.8, 0.25, 1.0
bezier = quick, 0.4, 0.0, 0.2, 1.0

animation = fadeIn, 1, 8, softIn        # lockscreen aparece suave (800ms)
animation = fadeOut, 1, 4, quick         # desbloqueo rápido (400ms)
animation = inputFieldDots, 1, 3, softIn # dots de password fluidos
animation = inputFieldFade, 1, 4, softIn # input fade smooth
animation = inputFieldColors, 1, 6, softIn # transición colores suave

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = $HOME/.config/hypr/hyprlock/backgrounds/rei.png
    blur_size = 3
    blur_passes = 1
    noise = 0.01
    contrast = 0.9
    brightness = 0.55
    vibrancy = 0.1
    vibrancy_darkness = 0.3
}

# PROFILE IMAGE - small circle above clock
image {
    monitor =
    path = $HOME/.config/hypr/hyprlock/backgrounds/profile_square.png
    size = 80
    rounding = -1
    border_size = 2
    border_color = $accentColor
    position = 80, 160
    halign = left
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
}

# GREETING - "Good Evening, cativo23"
label {
    monitor =
    text = cmd[update:3600000] h=$(date +%H); echo "Good $([ $h -lt 6 ] && echo 'Night' || ([ $h -lt 12 ] && echo 'Morning' || ([ $h -lt 18 ] && echo 'Afternoon' || echo 'Evening'))), $(whoami)"
    color = $accentDim
    font_size = 16
    font_family = $fontFamily
    position = 180, 160
    halign = left
    valign = center
}

# CLOCK - Hours:Minutes (large, left-aligned like rei)
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = $accentColor
    font_size = 120
    font_family = $fontFamily
    position = 80, 40
    halign = left
    valign = center
}

# DATE - "dddd, MMMM dd, yyyy" format matching rei
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d, %Y")"
    color = $accentColor
    font_size = 25
    font_family = $fontFamily SemiBold
    position = 85, -60
    halign = left
    valign = center
}

# SEPARATOR LINE - between date and input
label {
    monitor =
    text = ─────────────────────────
    color = $accentDim
    font_size = 10
    font_family = $fontFamily
    position = 80, -100
    halign = left
    valign = center
}

# INPUT FIELD - minimal, matching rei login style
input-field {
    monitor =
    size = 200, 35
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = $accentColor
    inner_color = $darkBg
    font_color = $accentColor
    fail_color = rgba(255, 100, 100, 0.8)
    check_color = rgba(195, 198, 251, 0.5)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 80, -140
    halign = left
    valign = center
    rounding = 10
}

# NOW PLAYING - shows current song if playing
label {
    monitor =
    text = cmd[update:5000] title=$(playerctl metadata title 2>/dev/null) && echo "♪ $title — $(playerctl metadata artist)" || echo "♪ Nothing playing"
    color = $accentDim
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 80, -185
    halign = left
    valign = center
}

# Battery Status
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $accentDim
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = -20, 20
    halign = right
    valign = bottom
}

# Keyboard Layout
label {
    monitor =
    text = $LAYOUT
    color = $accentDim
    font_size = 14
    font_family = $fontFamily
    position = -50, 20
    halign = right
    valign = bottom
}
