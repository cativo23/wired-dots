# wired-dots — Hyprland entry point
# Sources all config modules. Hardware-specific files sourced with noerror guard.

source = ./keybindings.conf
source = ./windowrules.conf
# monitors.conf is hardware-specific (generated per machine), missing on first boot
# hyprlang noerror true
source = ./monitors.conf
# hyprlang noerror false
source = ./userprefs.conf
source = ./animations.conf
source = ./workflows.conf

# nvidia.conf is deployed only when GPU=nvidia (installer creates it)
# hyprlang noerror true
source = ./nvidia.conf
# hyprlang noerror false
