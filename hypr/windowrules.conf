# wired-dots — window rules (Hyprland 0.50+ block syntax)
# Float system dialogs and configuration tools.

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|pwvucontrol)$
    float = yes
}

windowrule {
    name = float-net-config
    match:class = ^(nm-connection-editor|blueman-manager)$
    float = yes
}

windowrule {
    name = float-calc
    match:class = ^(org\.gnome\.Calculator)$
    float = yes
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
}

windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save As)$
    float = yes
}

windowrule {
    name = float-portal
    match:class = ^(xdg-desktop-portal-gtk)$
    float = yes
}

windowrule {
    name = sysmon-dropdown
    match:title = ^(sysmon)$
    float = yes
    size = 1200 700
    center = 1
}
